name: DB baseline (mark migration applied)

# One-time utility: if your database predates the migration pipeline (you
# applied the schema by hand), run this once from the Actions tab so
# `supabase db push` doesn't try to re-apply the initial migration.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Migration version to mark as applied
        required: true
        default: "20260715120000"

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      # Pin to commit SHAs (not floating tags) to reduce supply-chain risk
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: latest

      - name: Mark migration as applied
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MIGRATION_VERSION: ${{ inputs.version }}
        run: supabase migration repair --status applied "$MIGRATION_VERSION" --db-url "$SUPABASE_DB_URL"

      - name: Show migration status
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase migration list --db-url "$SUPABASE_DB_URL"
