name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Pin to commit SHAs (not floating tags) to reduce supply-chain risk
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install and verify
        run: |
          npm ci
          npm run verify:full
